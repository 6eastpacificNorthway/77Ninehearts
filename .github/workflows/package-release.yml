name: Package Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  package:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify compiled shaders exist
        run: |
          if [ ! -d "shaders/fxc" ] || [ -z "$(ls -A shaders/fxc 2>/dev/null)" ]; then
            echo "ERROR: shaders/fxc/ is missing or empty."
            echo "Push a commit to main first so build-shaders workflow runs,"
            echo "then tag after the compiled .vcs files are committed back."
            exit 1
          fi
          echo "Found compiled shaders:"
          ls -la shaders/fxc/

      - name: Build release zip
        run: |
          VERSION="${GITHUB_REF_NAME}"
          STAGING="ps2_horror_${VERSION}"
          mkdir -p "$STAGING"

          # Copy everything needed at runtime, skip source / dev / CI files
          cp -r lua "$STAGING/"
          cp -r materials "$STAGING/"
          cp -r shaders "$STAGING/"
          cp addon.json "$STAGING/"
          cp README.md "$STAGING/"

          zip -r "${STAGING}.zip" "$STAGING"
          ls -la "${STAGING}.zip"
          echo "ZIP_NAME=${STAGING}.zip" >> $GITHUB_ENV

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.ZIP_NAME }}
          generate_release_notes: true
