name: Build Shaders

on:
  push:
    branches: [main]
    paths:
      - 'shadersrc/**'
      - '.github/workflows/build-shaders.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download ShaderCompile
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path tools | Out-Null

          $api = "https://api.github.com/repos/SCell555/ShaderCompile/releases/latest"
          Write-Host "Querying $api"
          $release = Invoke-RestMethod -Uri $api -Headers @{ "User-Agent" = "gh-actions" }

          Write-Host "Release: $($release.tag_name)"
          Write-Host "Assets:"
          $release.assets | ForEach-Object { Write-Host "  - $($_.name) ($($_.size) bytes)" }

          $asset = $release.assets | Where-Object {
              $_.name -match '\.(7z|zip)$' -and $_.name -notmatch 'source'
          } | Select-Object -First 1

          if (-not $asset) {
              throw "No binary asset found on latest release."
          }

          Write-Host "Downloading: $($asset.name)"
          Invoke-WebRequest -Uri $asset.browser_download_url -OutFile "tools/sc_archive"

          if ($asset.name -match '\.7z$') {
              7z x tools/sc_archive -otools -y
          } else {
              Expand-Archive -Path tools/sc_archive -DestinationPath tools -Force
          }

          Write-Host "Contents of tools/:"
          Get-ChildItem -Path tools -Recurse | ForEach-Object { Write-Host "  $($_.FullName)" }

      - name: Locate ShaderCompile.exe
        shell: pwsh
        run: |
          $exe = Get-ChildItem -Path tools -Filter ShaderCompile.exe -Recurse | Select-Object -First 1
          if (-not $exe) { throw "ShaderCompile.exe not found after extraction" }
          if ($exe.FullName -ne (Resolve-Path "tools/ShaderCompile.exe" -ErrorAction SilentlyContinue)) {
            Copy-Item $exe.FullName "tools/ShaderCompile.exe" -Force
          }
          Write-Host "Using: $(Resolve-Path tools/ShaderCompile.exe)"

      - name: Show ShaderCompile help
        shell: pwsh
        run: |
          $compiler = Resolve-Path "tools/ShaderCompile.exe"
          Write-Host "=== ShaderCompile -h ==="
          & $compiler -h 2>&1 | ForEach-Object { Write-Host $_ }
          Write-Host ""
          Write-Host "=== ShaderCompile --help ==="
          & $compiler --help 2>&1 | ForEach-Object { Write-Host $_ }
          Write-Host ""
          Write-Host "=== ShaderCompile with no args ==="
          & $compiler 2>&1 | ForEach-Object { Write-Host $_ }
          Write-Host ""
          Write-Host "(Always exiting 0 so the workflow continues)"
          exit 0

      - name: Prepare output directory
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path shaders/fxc | Out-Null

      - name: Compile shaders
        shell: pwsh
        run: |
          $compiler = Resolve-Path "tools/ShaderCompile.exe"
          $outDir   = Resolve-Path "shaders"
          $srcDir   = Resolve-Path "shadersrc"

          Write-Host "Compiler:  $compiler"
          Write-Host "Output:    $outDir"
          Write-Host "Source:    $srcDir"

          Push-Location $srcDir
          Write-Host "Changed to: $(Get-Location)"
          Write-Host ""

          $list = Get-Content "compile_shader_list.txt" |
              Where-Object { $_ -and -not $_.StartsWith("#") }

          $failed = @()
          $manifest = @()

          foreach ($hlsl in $list) {
              $hlsl = $hlsl.Trim()
              if (-not $hlsl) { continue }

              if (-not (Test-Path $hlsl)) {
                  Write-Warning "Skipping missing source: $hlsl"
                  continue
              }

              $fxcName = [System.IO.Path]::ChangeExtension($hlsl, ".fxc")

              Write-Host ""
              Write-Host "=== Compiling $hlsl ==="

              Copy-Item -LiteralPath $hlsl -Destination $fxcName -Force
              if (-not (Test-Path $fxcName)) {
                  Write-Error "Copy failed: $fxcName was not created"
                  $failed += $hlsl
                  continue
              }
              Write-Host "  Copied OK. Size: $((Get-Item $fxcName).Length) bytes"
              Write-Host "  CWD: $(Get-Location)"
              Write-Host "  Running: ShaderCompile.exe -ver 20b -shaderpath $outDir $fxcName"

              $beforeFiles = @(Get-ChildItem -Path $outDir -Recurse -File -ErrorAction SilentlyContinue |
                  Select-Object -ExpandProperty FullName)

              & $compiler -ver 20b -shaderpath "$outDir" $fxcName
              $code = $LASTEXITCODE
              Write-Host "  Exit code: $code"

              Remove-Item -LiteralPath $fxcName -Force -ErrorAction SilentlyContinue

              if ($code -ne 0) {
                  Write-Error "ShaderCompile failed on $hlsl (exit $code)"
                  $failed += $hlsl
                  continue
              }

              $afterFiles = @(Get-ChildItem -Path $outDir -Recurse -File -ErrorAction SilentlyContinue |
                  Select-Object -ExpandProperty FullName)

              $newFiles = $afterFiles | Where-Object { $beforeFiles -notcontains $_ }
              if (-not $newFiles) {
                  Write-Warning "No new files produced for $hlsl"
                  $failed += $hlsl
                  continue
              }

              foreach ($f in $newFiles) {
                  $manifest += [pscustomobject]@{
                      Source = $hlsl
                      Output = (Resolve-Path $f).Path.Replace("$($outDir)\", "").Replace("$($outDir)/", "")
                  }
              }
          }

          Pop-Location

          Write-Host ""
          Write-Host "=== Compile manifest ==="
          $manifest | Format-Table -AutoSize

          $manifest | ConvertTo-Json | Out-File -FilePath "shaders/_manifest.json" -Encoding utf8

          if ($failed.Count -gt 0) {
              throw "Shader compilation failed for: $($failed -join ', ')"
          }

      - name: List compiled artifacts
        shell: pwsh
        run: |
          Write-Host "Compiled .vcs files:"
          Get-ChildItem -Path shaders -Recurse -Filter *.vcs | ForEach-Object {
              Write-Host "  $($_.FullName.Replace((Get-Location).Path, '').TrimStart('\'))"
          }

      - name: Commit compiled shaders
        shell: pwsh
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add shaders/
          if (git diff --cached --quiet) {
              Write-Host "No shader changes to commit."
          } else {
              git commit -m "Rebuild shaders [skip ci]"
              git push
          }
